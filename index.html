      div.className = 'item';
      div.innerHTML = `
        <div class="top"><div class="code">${esc(it.code)}</div></div>
        <div class="url">${esc(it.url)}</div>
        <div class="btns">
          <button class="copy" type="button" data-url="${esc(it.url)}">링크 복사</button>
          <a class="btn open" href="${esc(it.url)}" target="_blank" rel="noopener">접수 열기</a>
        </div>`;
      box.appendChild(div);
    });
    list.appendChild(d);
  });
  empty.style.display = shown ? 'none' : 'block';
}

list.addEventListener('click', async (e) => {
  const btn = e.target.closest('button.copy');
  if (!btn) return;
  const url = btn.dataset.url;
  try {
    await navigator.clipboard.writeText(url);
    btn.textContent = '복사 완료';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '링크 복사'; btn.classList.remove('ok'); }, 1200);
  } catch(err) {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    btn.textContent = '복사 완료';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '링크 복사'; btn.classList.remove('ok'); }, 1200);
  }
});
q.addEventListener('input', () => render(q.value));
render();
</script>
</body>
</html>

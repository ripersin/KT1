<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KT1 접수 링크</title>
  <style>
    :root {
      --bg:#f4f7fb;
      --card:#ffffff;
      --ink:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ef;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --soft:#eaf1ff;
      --success:#10b981;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      color:var(--ink);
      background:linear-gradient(180deg,#eaf2ff 0%, var(--bg) 240px);
    }
    .wrap {
      width:min(920px, 100%);
      margin:0 auto;
      padding:20px 14px 60px;
    }
    header {
      padding:18px 4px 16px;
    }
    h1 {
      margin:0;
      font-size:26px;
      letter-spacing:-0.04em;
    }
    .sub {
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
    }
    .toolbar {
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(244,247,251,.92);
      backdrop-filter:blur(10px);
      padding:10px 0 12px;
      border-bottom:1px solid rgba(219,227,239,.7);
    }
    .searchbox {
      display:flex;
      gap:8px;
      align-items:center;
    }
    input[type="search"] {
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:13px 14px;
      font-size:16px;
      outline:none;
      box-shadow:0 8px 22px rgba(30,64,175,.06);
    }
    .miniBtns {
      display:flex;
      gap:8px;
      margin-top:10px;
    }
    .miniBtns button {
      flex:1;
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      border-radius:12px;
      padding:10px;
      font-weight:700;
    }
    .stats {
      margin:12px 4px 10px;
      color:var(--muted);
      font-size:13px;
    }
    details {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      margin:10px 0;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(15,23,42,.05);
    }
    summary {
      list-style:none;
      cursor:pointer;
      padding:16px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:900;
      letter-spacing:-0.03em;
      user-select:none;
    }
    summary::-webkit-details-marker { display:none; }
    .count {
      color:var(--primary);
      background:var(--soft);
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      white-space:nowrap;
    }
    details[data-group="아이폰 17 시리즈"] summary span:first-child,
details[data-group="갤럭시 S26 시리즈"] summary span:first-child {
  color:#ed2024;
}
.items {
      border-top:1px solid var(--line);
      padding:10px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .item {
      border:1px solid #edf1f7;
      border-radius:16px;
      padding:12px;
      background:#fbfdff;
    }
    .model {
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.02em;
      margin-bottom:10px;
      word-break:break-all;
    }
    .actions {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .actions.single { grid-template-columns:1fr; }
    .btn {
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      border-radius:12px;
      border:0;
      text-decoration:none;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
    }
    .open {
      background:var(--primary);
      color:#fff;
    }
    .copy {
      background:#eef2f7;
      color:#1f2937;
    }
    .open:active { background:var(--primary-dark); }
    .toast {
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%) translateY(20px);
      background:#111827;
      color:white;
      padding:12px 16px;
      border-radius:999px;
      font-size:14px;
      opacity:0;
      pointer-events:none;
      transition:.22s ease;
      box-shadow:0 12px 30px rgba(0,0,0,.25);
      z-index:30;
      white-space:nowrap;
    }
    .toast.show {
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
    .empty {
      display:none;
      margin:20px 4px;
      padding:22px;
      background:#fff;
      border:1px dashed var(--line);
      border-radius:18px;
      color:var(--muted);
      text-align:center;
    }
    footer {
      margin-top:18px;
      color:#94a3b8;
      font-size:12px;
      text-align:center;
    }
    .toolbar.no-search { justify-content:flex-end; }
    @media (max-width:640px) {
      .wrap { padding:16px 12px 44px; }
      h1 { font-size:23px; }
      .items { grid-template-columns:1fr; }
      summary { padding:15px 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>KT1 접수 링크</h1>
      <div class="sub">필요한 기종을 펼쳐서 접수 링크를 열거나 복사하세요.</div>
    </header>

    <div class="toolbar no-search">
      <div class="miniBtns">
        <button type="button" id="openAll">모두 펼치기</button>
        <button type="button" id="closeAll">모두 접기</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>
    <main id="list"></main>
    <div class="empty" id="empty">검색 결과가 없습니다.</div>
    <footer>KT1 링크 모음</footer>
  </div>

  <div class="toast" id="toast">복사 완료</div>

const list = document.getElementById('list');
const stats = document.getElementById('stats');
const empty = document.getElementById('empty');
const toast = document.getElementById('toast');

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'
  }[s]));
}

function render() {
  const q = '';
  let total = 0;
  let html = '';

  DATA.forEach(group => {
    const filtered = group.items;
    if (!filtered.length) return;

    total += filtered.length;
    html += `<details data-group="${escapeHtml(group.name)}">`;
    html += `<summary><span>${escapeHtml(group.name)}</span><span class="count">${filtered.length}개</span></summary>`;
    html += '<div class="items">';
    filtered.forEach(item => {
      const hasUrl = !!item.url;
      const hasCopyText = !!item.copyText;
      const copyValue = hasCopyText ? item.copyText : item.url;
      const copyLabel = item.copyLabel || '링크 복사';
      html += `
        <div class="item" data-model="${escapeHtml(item.model)}"> 
          <div class="model">${escapeHtml(item.model)}</div>
          <div class="actions ${!hasUrl ? 'single' : ''}">
            ${hasUrl ? `<a class="btn open" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">접수 열기</a>` : ''}
            <button class="btn copy" type="button" data-copy="${escapeHtml(copyValue)}" data-model="${escapeHtml(item.model)}" data-kind="${hasCopyText ? 'form' : 'url'}">${escapeHtml(copyLabel)}</button>
          </div>
        </div>
      `;
    });
    html += '</div></details>';
  });

  list.innerHTML = html;
  stats.textContent = `총 ${DATA.reduce((a,g)=>a+g.items.length,0)}개 / ${DATA.length}개 그룹`;
  empty.style.display = total ? 'none' : 'block';
}

function showToast(text) {
  toast.textContent = text;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1400);
}

async function copyText(text, message = '복사 완료') {
  try {
    await navigator.clipboard.writeText(text);
    showToast(message);
  } catch (e) {
    const t = document.createElement('textarea');
    t.value = text;
    document.body.appendChild(t);
    t.select();
    document.execCommand('copy');
    document.body.removeChild(t);
    showToast(message);
  }
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.copy');
  if (!btn) return;
  copyText(btn.dataset.copy, btn.dataset.kind === 'form' ? '양식 복사 완료' : '링크 복사 완료');
});


document.getElementById('openAll').addEventListener('click', () => {
  document.querySelectorAll('details').forEach(d => d.open = true);
});
document.getElementById('closeAll').addEventListener('click', () => {
  document.querySelectorAll('details').forEach(d => d.open = false);
});

render();
</script>
